# YAML does not allow tabs for indentation.
# Use spaces only (typically 2 spaces per level).
version: '3'
services:
  app:
    build: .
    ports:
      - 8000:8000
    environment:
      - DATABASE_URL=postgresql://${SECRET_USERNAME}:${SECRET_PASSWORD}@db:5432/db
      - REDIS_URL=redis://redis:6379
  db:
    image: postgres
    environment:
      - POSTGRES_PASSWORD=${SECRET_PASSWORD}
      - POSTGRES_USER=${SECRET_USERNAME}
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis
    ports: 
      - 6379:6379

volumes:
  postgres_data: